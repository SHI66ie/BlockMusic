services:
  genlayer-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blockmusic-genlayer
    ports:
      - "8000:8000"
    environment:
      - GENLAYER_NETWORK=simulator
      - GENLAYER_RPC_URL=http://localhost:8545
      - LOG_LEVEL=INFO
      - MUSIC_NFT_CONTRACT=0xF29A2DCC8877fac176C36F30d6245C4320e90841
    volumes:
      - ./contracts:/app/contracts
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - blockmusic-network

  # Optional: Redis for caching results
  redis:
    image: redis:7-alpine
    container_name: blockmusic-genlayer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - blockmusic-network

networks:
  blockmusic-network:
    driver: bridge

volumes:
  redis-data:
